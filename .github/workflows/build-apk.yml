name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (for sdkmanager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        env:
          SKIP_JDK_VERSION_CHECK: 1

      - name: Install NDK r23c (compatible with AGP 3.6)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/16.0/bin/sdkmanager "ndk;23.1.7779620"

      - name: Set up JDK 11 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew gradlew.bat
          ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/23.1.7779620 ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VOSK-Live-Subtitle-CN
          path: app/build/outputs/apk/debug/*.apk
